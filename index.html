<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Perfil Académico  - U.E. Néstor Mogollón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfbf7; }
        
        :root {
            --brand-red: #800000;
            --brand-gold: #D4AF37;
        }

        .chart-container { position: relative; width: 100%; max-width: 550px; margin: auto; height: 350px; }
        .app-gradient { background: linear-gradient(135deg, var(--brand-red) 0%, #a52a2a 100%); }
        .btn-gold { background-color: var(--brand-gold); color: #fff; transition: all 0.3s ease; }
        .btn-gold:hover { background-color: #b8962f; transform: translateY(-2px); }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(128, 0, 0, 0.2); }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 app-gradient rounded-full flex items-center justify-center text-white font-black">NM</div>
                <div>
                    <h1 class="font-extrabold text-lg leading-tight text-slate-900">U.E. Néstor Mogollón</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Simulador de Perfil Académico</p>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div id="app-viewport" class="max-w-3xl w-full">
            
            <!-- Pantalla de Inicio -->
            <div id="screen-intro" class="glass-panel rounded-[2rem] p-8 md:p-12 text-center space-y-8 shadow-xl">
                <h2 class="text-3xl md:text-5xl font-black text-slate-900 leading-[1.1]">
                    ¿Ciencias o <span class="text-[var(--brand-red)]">Técnicos?</span>
                </h2>
                <p class="text-slate-600 font-medium max-w-lg mx-auto">
                    Responde esta breve guía para descubrir la ruta académica que mejor potencia tus habilidades y metas de futuro.
                </p>
                <button onclick="launchSimulation()" class="btn-gold font-bold py-4 px-10 rounded-xl shadow-lg text-lg">
                    Comenzar Análisis
                </button>
            </div>

            <div id="screen-simulator" class="hidden glass-panel rounded-[2rem] p-6 md:p-10 shadow-lg space-y-8 relative overflow-hidden">
                <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-line" class="h-full app-gradient transition-all duration-300" style="width: 0%"></div>
                </div>
                <div>
                    <span id="step-label" class="text-[10px] font-black text-[var(--brand-red)] uppercase tracking-[0.2em]">Cargando...</span>
                    <h3 id="question-label" class="text-xl md:text-2xl font-bold text-slate-900 mt-2">...</h3>
                </div>
                <div id="options-grid" class="grid gap-3"></div>
            </div>

            <div id="screen-report" class="hidden space-y-6">
                <div class="glass-panel rounded-[2rem] p-8 md:p-10 shadow-lg">
                    <h2 id="final-profile" class="text-3xl font-black text-[var(--brand-red)] mb-4">...</h2>
                    <p id="final-text" class="text-slate-700 leading-relaxed font-medium mb-6"></p>
                    
                    <div id="alert-zone" class="hidden p-4 bg-amber-50 border-l-4 border-amber-500 rounded text-amber-900 text-sm mb-6"></div>
                    
                    <div class="chart-container">
                        <canvas id="profileChart"></canvas>
                    </div>

                    <button onclick="location.reload()" class="mt-8 w-full py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 transition-all uppercase text-xs tracking-widest">
                        Reiniciar Análisis
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const surveyData = [
            { dim: "Estilo de Vida", q: "¿Qué rutina prefieres para tus años de colegio?", opts: [{k:'A', t:"Jornada equilibrada con tiempo para deportes y familia."}, {k:'B', t:"Jornada de mayor exigencia y trabajo práctico constante."}, {k:'C', t:"Jornada flexible para explorar herramientas digitales."}] },
            { dim: "Metas", q: "¿Qué te emociona más al graduarte?", opts: [{k:'A', t:"Acceder a la universidad para una carrera profesional."}, {k:'B', t:"Aprender un oficio técnico para trabajar y emprender."}, {k:'C', t:"Desarrollar proyectos digitales a mi propio ritmo."}] },
            { dim: "Entornos", q: "¿Dónde te sientes más cómodo?", opts: [{k:'A', t:"En laboratorio o aula teórica, analizando teoría."}, {k:'B', t:"En el taller, desarmando y reparando equipos."}, {k:'C', t:"En mi entorno digital, explorando apps y software."}] },
            { dim: "Pasiones", q: "¿Qué harías por horas sin cansarte?", opts: [{k:'A', t:"Investigar y entender teorías complejas."}, {k:'B', t:"Reparar cosas, soldar y conectar circuitos."}, {k:'C', t:"Diseñar, editar o programar contenido digital."}] },
            { dim: "Adaptación", q: "¿Qué te motiva de una tecnología nueva?", opts: [{k:'A', t:"Su impacto social y beneficios a la comunidad."}, {k:'B', t:"Entender cómo está construida y su mantenimiento."}, {k:'C', t:"Las posibilidades creativas de usarla."}] },
            { dim: "Habilidades", q: "¿Cómo es tu relación con herramientas?", opts: [{k:'A', t:"Prefiero el trabajo intelectual y de análisis."}, {k:'B', t:"Disfruto el trabajo manual y mecánico."}, {k:'C', t:"Soy hábil con lo digital, pero prefiero no usar herramientas manuales."}] },
            { dim: "Roles", q: "En un grupo, ¿cuál es tu rol habitual?", opts: [{k:'A', t:"El estratega que organiza la investigación."}, {k:'B', t:"El ejecutor que arma y hace que funcione."}, {k:'C', t:"El creativo que diseña la interfaz y presentación."}] },
            { dim: "Familia", q: "(Para el padre) ¿Qué visión de éxito tiene?", opts: [{k:'A', t:"Preparación académica para ingreso universitario."}, {k:'B', t:"Capacitación técnica para inserción laboral rápida."}, {k:'C', t:"Formación en tecnología moderna sin cargas técnicas físicas."}] }
        ];

        let step = 0;
        let logs = [];

        function launchSimulation() {
            document.getElementById('screen-intro').classList.add('hidden');
            document.getElementById('screen-simulator').classList.remove('hidden');
            renderStep();
        }

        function renderStep() {
            const data = surveyData[step];
            document.getElementById('step-label').innerText = `Dimensión: ${data.dim}`;
            document.getElementById('question-label').innerText = data.q;
            document.getElementById('progress-line').style.width = `${((step + 1) / surveyData.length) * 100}%`;

            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            data.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = "text-left p-4 rounded-xl border border-slate-200 hover:border-[var(--brand-red)] hover:bg-slate-50 transition-all font-semibold text-slate-700";
                b.innerText = o.t;
                b.onclick = () => {
                    logs.push(o.k);
                    if(step < surveyData.length - 1) { step++; renderStep(); }
                    else { processFinalReport(); }
                };
                grid.appendChild(b);
            });
        }

        function processFinalReport() {
            const s = { A: 0, B: 0, C: 0 };
            logs.forEach(l => s[l]++);
            let p = 'A', warn = "", txt = "", title = "";

            if (s.B > s.A && s.B > s.C) p = 'B';
            if (s.C > s.A && s.C > s.B) p = 'C';
            if (s.B === s.C && s.B > s.A) p = 'B';
            if (s.A === s.C && s.A > s.B) p = 'A';
            if (logs[2] === 'B' && p === 'C') warn = "Aunque tienes interés digital, el Bachillerato Técnico exige una dedicación manual física constante. Si no es tu pasión, Ciencias es más seguro.";

            if (p === 'A') {
                title = "Perfil Académico Investigador";
                txt = "Tu arquitectura mental se orienta hacia la teoría y el análisis. El Bachillerato en Ciencias es tu opción segura: te garantiza una base conceptual sólida para la universidad y un horario equilibrado.";
            } else if (p === 'B') {
                title = "Perfil Técnico Operativo";
                txt = "Tu perfil es práctico y resolutivo. El Bachillerato Técnico en Soporte Informático te dará las competencias para insertarte pronto en el mundo laboral real.";
            } else {
                title = "Perfil Creativo Digital";
                txt = "Tienes un alto potencial creativo. Dado que el perfil es más creativo y menos manual/mecánico, te recomendamos Ciencias. Tendrás formación universitaria y flexibilidad para liderar proyectos tecnológicos.";
            }

            document.getElementById('screen-simulator').classList.add('hidden');
            document.getElementById('screen-report').classList.remove('hidden');
            document.getElementById('final-profile').innerText = title;
            document.getElementById('final-text').innerText = txt;
            if(warn) { document.getElementById('alert-zone').innerText = warn; document.getElementById('alert-zone').classList.remove('hidden'); }
            
            new Chart(document.getElementById('profileChart').getContext('2d'), {
                type: 'doughnut',
                data: { labels: ['Académico', 'Técnico', 'Digital'], datasets: [{ data: [s.A, s.B, s.C], backgroundColor: ['#800000', '#D4AF37', '#1E293B'] }] },
                options: { plugins: { legend: { position: 'bottom' } } }
            });
        }
    </script>
</body>
</html>
